<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik İzi | Sınav Paneli</title>
    <style>
        :root { --dark: #1e272e; --accent: #ff9f43; --card: #2f3542; --success: #05c46b; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 30px; }
        .exam-row { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .exam-info h3 { margin-bottom: 5px; color: var(--accent); }
        .exam-info span { font-size: 13px; color: #aaa; }
        .btn-start { background: var(--success); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .timer-box { background: #ff5e57; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="timer-box">
        <h2>⏳ Sıradaki Deneme Sınavı: 2 Gün 14 Saat Kaldı</h2>
    </div>

    <h1>✍️ Aktif Sınavlar</h1>
    <div style="margin-top: 20px;">
        <div class="exam-row">
            <div class="exam-info">
                <h3>Konu Tarama Testi - 12</h3>
                <span>20 Soru | 40 Dakika | Zorluk: Orta</span>
            </div>
            <button class="btn-start" onclick="location.href='#test'">Sınava Başla</button>
        </div>
        <div class="exam-row">
            <div class="exam-info">
                <h3>Haftalık LGS Denemesi</h3>
                <span>40 Soru | 80 Dakika | Zorluk: Zor</span>
            </div>
            <button class="btn-start">Sınava Başla</button>
        </div>
        <div class="exam-row" style="opacity: 0.6;">
            <div class="exam-info">
                <h3>Geçmiş Sınav: Cebirsel İfadeler</h3>
                <span>Puanın: 85/100</span>
            </div>
            <button class="btn-start" style="background: #3c40c6;">Sonuçları Gör</button>
        </div>
    </div>
</body>
</html>
