<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik İzi | Panel</title>
    <style>
        :root { --dark: #1e272e; --side: #0f1419; --accent: #ff9f43; --card: #2f3542; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #d2dae2; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--side); padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .profile { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        #uPic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .nav-link { padding: 12px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .active { background: var(--accent); color: white; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">MATEMATİK İZİ</h2>
        <div class="profile">
            <img id="uPic" src="">
            <h3 id="uName" style="margin-top:10px; color:white;"></h3>
        </div>
        <div class="nav-link active" onclick="location.href='dashboard.html'">🏠 Ana Panel</div>
        <div class="nav-link" onclick="location.href='kitapsun.html'">📚 Kitaplar</div>
        <div class="nav-link" onclick="location.href='vidsim.html'">🧪 Atölyeler</div>
        <div class="nav-link" onclick="location.href='sınavpan.html'">✍️ Sınav Merkezi</div>
    </div>
    <div class="main">
        <h1 style="margin-bottom: 30px;">Hoş geldin, <span id="wName" style="color:var(--accent)"></span>!</h1>
        <div class="card-grid">
            <div class="card"><h3>Ders Sunumları</h3><button class="btn" onclick="location.href='kitapsun.html'">Hemen Başla</button></div>
            <div class="card"><h3>Matematik Sınavı</h3><button class="btn" onclick="location.href='sınavpan.html'">Teste Başla</button></div>
        </div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('uName').innerText = localStorage.getItem('m_izi_name');
            document.getElementById('wName').innerText = localStorage.getItem('m_izi_name');
            document.getElementById('uPic').src = localStorage.getItem('m_izi_img');
        };
    </script>
</body>
</html>
