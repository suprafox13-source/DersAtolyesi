<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa Üstündağ Ortaokulu - 5-A Matematik İzi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 5px;
            font-size: 20px;
        }
        h3 {
            color: #666;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: normal;
        }
        .section {
            margin-bottom: 20px;
            text-align: left;
        }
        .section-title {
            font-weight: bold;
            color: #444;
            margin-bottom: 10px;
            display: block;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-test {
            background-color: #28a745;
        }
        .btn-test:hover {
            background-color: #218838;
        }
        .viewer {
            margin-top: 20px;
            border-top: 2px solid #ddd;
            padding-top: 20px;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: none;
        }
        .status {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏫 MUSTAFA ÜSTÜNDAĞ ORTAOKULU</h2>
    <h3>5-A Matematik İzi Kontrol Paneli</h3>

    <div class="section">
        <span class="section-title">📖 Sunumlar</span>
        <div class="btn-group">
            <button class="btn" onclick="dosyaAc('mat1.pdf')">📄 Matematik 1. Fasikül</button>
            <button class="btn" onclick="dosyaAc('mat2.pdf')">📄 Matematik 2. Fasikül</button>
        </div>
    </div>

    <div class="section">
        <span class="section-title">📝 Çalışma Testleri</span>
        <div class="btn-group">
            <button class="btn btn-test" onclick="dosyaAc('test1.pdf')">✍️ Konu Testi 1</button>
            <button class="btn btn-test" onclick="dosyaAc('test2.pdf')">✍️ Konu Testi 2</button>
        </div>
    </div>

    <div class="viewer">
        <div id="status" class="status">📺 Ekran: Dosya bekleniyor...</div>
        <iframe id="pdfViewer" src=""></iframe>
    </div>
</div>

<script>
    // Klasörün içindeki PDF'leri açan orijinal fonksiyon
    function dosyaAc(dosyaAdi) {
        const iframe = document.getElementById('pdfViewer');
        const status = document.getElementById('status');
        
        // GitHub'daki Sunumlar klasörünü hedef gösteriyoruz
        const dosyaYolu = "Sunumlar/" + dosyaAdi;
        
        iframe.src = dosyaYolu;
        iframe.style.display = "block";
        status.innerText = "📺 Şu an açık: " + dosyaAdi;
    }
</script>

</body>
</html>
