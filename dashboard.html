<div class="card" style="border: 1px solid #ddd; background: #fff; margin-bottom: 20px; border-radius: 8px; padding: 15px; font-family: sans-serif;">
    
    <div style="text-align: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 15px;">
        <h3 style="margin: 0; color: #333; font-size: 16px;">🏫 MUSTAFA ÜSTÜNDAĞ ORTAOKULU</h3>
        <span style="font-size: 11px; color: #666;">5-A Matematik İzi Paneli</span>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px;">📂 5-A Ders Klasörü:</label>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div style="background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #e0e0e0;">
                <span style="font-size: 11px; font-weight: bold; color: #2ecc71; display: block; margin-bottom: 5px;">📖 Sunumlar (Fasiküller)</span>
                <button onclick="dosyaAc('mat1.pdf')" style="width: 100%; padding: 6px; font-size: 11px; margin-bottom: 4px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; text-align: left;">📄 Matematik 1. Fasikül</button>
                <button onclick="dosyaAc('mat2.pdf')" style="width: 100%; padding: 6px; font-size: 11px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; text-align: left;">📄 Matematik 2. Fasikül</button>
            </div>

            <div style="background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #e0e0e0;">
                <span style="font-size: 11px; font-weight: bold; color: #e74c3c; display: block; margin-bottom: 5px;">📝 Çalışma Testleri</span>
                <button onclick="dosyaAc('test1.pdf')" style="width: 100%; padding: 6px; font-size: 11px; margin-bottom: 4px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; text-align: left;">✍️ Konu Testi 1</button>
                <button onclick="dosyaAc('test2.pdf')" style="width: 100%; padding: 6px; font-size: 11px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; text-align: left;">✍️ Konu Testi 2</button>
            </div>
        </div>
    </div>

    <div style="background: #f5f5f5; border: 1px solid #ccc; border-radius: 6px; padding: 8px; text-align: center;">
        <span id="ekranDurum" style="color: #666; font-size: 11px; display: block; margin-bottom: 5px;">📺 Ekran: Dosya bekleniyor...</span>
        
        <iframe id="dersEkran" src="" width="100%" height="450px" style="border: none; display: none; background: white; border-radius: 4px;"></iframe>
    </div>
</div>

<script>
    // Klasördeki dosyayı ekrana getiren fonksiyon
    function dosyaAc(dosyaAdi) {
        const ekran = document.getElementById('dersEkran');
        const durum = document.getElementById('ekranDurum');
        
        // Klasör içindeki dosyaya yönlendiriyoruz (Aynı klasörde olmaları gerekir)
        ekran.src = dosyaAdi;
        ekran.style.display = "block";
        durum.innerText = "📺 Şu an açık: " + dosyaAdi + " (MÜO 5-A)";
    }
</script>
