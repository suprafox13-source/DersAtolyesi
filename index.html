<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik İzi | Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c29; background: linear-gradient(to right, #24243e, #302b63, #0f0c29); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); width: 400px; text-align: center; }
        h1 { margin-bottom: 20px; font-size: 32px; letter-spacing: 2px; }
        h1 span { color: #ff9f43; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff9f43; margin: 0 auto 20px; overflow: hidden; position: relative; background: #222; }
        #preview { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn { position: absolute; bottom: 0; background: rgba(255,159,67,0.8); width: 100%; font-size: 12px; padding: 5px; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 20px; outline: none; font-size: 16px; }
        .btn-go { width: 100%; padding: 15px; background: #ff9f43; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-go:hover { background: #ee5253; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>MATEMATİK <span>İZİ</span></h1>
        <div class="avatar-box">
            <img src="" id="preview" alt="">
            <label for="imgInp" class="upload-btn">FOTOĞRAF SEÇ</label>
            <input type="file" id="imgInp" accept="image/*" style="display:none">
        </div>
        <input type="text" id="uName" placeholder="Adın ve Soyadın" required>
        <button class="btn-go" onclick="saveAndGo()">Atölyeye Başla →</button>
    </div>

    <script>
        let photoData = "";
        document.getElementById('imgInp').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = () => { 
                document.getElementById('preview').src = reader.result; 
                photoData = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function saveAndGo() {
            const name = document.getElementById('uName').value;
            if(!name) return alert("Lütfen adını yaz!");
            localStorage.setItem('m_izi_name', name);
            localStorage.setItem('m_izi_img', photoData);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
