<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik İzi | Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c29; background: linear-gradient(135deg, #0f0c29, #302b63); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        h1 span { color: #ff9f43; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff9f43; margin: 0 auto 20px; overflow: hidden; position: relative; background: #222; }
        #preview { width: 100%; height: 100%; object-fit: cover; }
        .upload-label { position: absolute; bottom: 0; width: 100%; background: rgba(255,159,67,0.9); font-size: 11px; cursor: pointer; padding: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: none; margin: 20px 0; outline: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; }
        .btn { width: 100%; padding: 16px; background: #ff9f43; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #ee5253; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MATEMATİK <span>İZİ</span></h1>
        <p style="color: #aaa; margin-bottom: 20px;">Profilini oluştur ve izini bırak!</p>
        <div class="avatar-box">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Math" id="preview">
            <label for="imgInp" class="upload-label">FOTOĞRAF YÜKLE</label>
            <input type="file" id="imgInp" accept="image/*" style="display:none">
        </div>
        <input type="text" id="uName" placeholder="Adınız Soyadınız" maxlength="20">
        <button class="btn" onclick="girisYap()">Atölyeye Gir →</button>
    </div>

    <script>
        // AKILLI FİLTRE SİSTEMİ
        const Filtre = {
            yasakli: ["kufur", "argo", "kotu"], // Temel kökler, sistem türevleri bulur
            kontrol: function(metin) {
                const normalize = metin.toLowerCase().replace(/[043157@$]/g, m => ({'0':'o','4':'a','3':'e','1':'i','5':'s','7':'t','@':'a','$':'s'}[m] || m));
                return this.yasakli.some(k => normalize.includes(k));
            }
        };

        let photoData = "";
        document.getElementById('imgInp').onchange = function(e) {
            let r = new FileReader();
            r.onload = () => { 
                document.getElementById('preview').src = r.result; 
                photoData = r.result; 
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function girisYap() {
            const name = document.getElementById('uName').value.trim();
            if(!name) return alert("Lütfen ismini yaz!");
            
            if(Filtre.kontrol(name)) {
                alert("Uygunsuz isim tespit edildi! Lütfen düzeltin.");
                return;
            }

            localStorage.setItem('m_izi_name', name);
            localStorage.setItem('m_izi_img', photoData || document.getElementById('preview').src);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
