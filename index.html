<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik İzi | Güvenli Giriş</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c29; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 400px; text-align: center; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff9f43; margin: 0 auto 20px; overflow: hidden; position: relative; background: #222; }
        #preview { width: 100%; height: 100%; object-fit: cover; }
        .upload-label { position: absolute; bottom: 0; width: 100%; background: rgba(255,159,67,0.9); font-size: 11px; cursor: pointer; padding: 8px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: none; margin: 20px 0; outline: none; background: rgba(255,255,255,0.1); color: white; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 16px; background: #ff9f43; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #555; cursor: wait; }
        #ai-status { font-size: 12px; color: #ff9f43; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MATEMATİK <span>İZİ</span></h1>
        <p style="color: #888; margin-bottom: 20px;">Sadece Gerçek İsimlere İzin Verilir</p>
        
        <div class="avatar-box">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Math" id="preview">
            <label for="imgInp" class="upload-label">FOTOĞRAF SEÇ</label>
            <input type="file" id="imgInp" accept="image/*" style="display:none">
        </div>

        <p id="ai-status">AI Denetçisi Hazırlanıyor...</p>

        <input type="text" id="uName" placeholder="Adınız Soyadınız" maxlength="25">
        <button id="loginBtn" class="btn" onclick="dogrula veGir()" disabled>Atölyeye Gir →</button>
    </div>

    <script>
        let model;
        let photoData = "";
        const loginBtn = document.getElementById('loginBtn');
        const aiStatus = document.getElementById('ai-status');

        async function loadAI() {
            try {
                model = await mobilenet.load();
                aiStatus.innerText = "Sistem Güvenli ✅";
                aiStatus.style.color = "#05c46b";
                loginBtn.disabled = false;
            } catch (e) { aiStatus.innerText = "Yükleme Hatası!"; }
        }
        loadAI();

        document.getElementById('imgInp').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const imgUrl = URL.createObjectURL(file);
            document.getElementById('preview').src = imgUrl;
            photoData = imgUrl;
            aiStatus.innerText = "Görsel İncelendi ✅";
        };

        function dogrula_ve_Gir() {
            const name = document.getElementById('uName').value.trim();
            
            // 1. KURAL: Sadece harfler ve boşluk olabilir (Sayı ve özel karakter yasak)
            const sadeceHarf = /^[a-zA-ZçğıöşüÇĞİÖŞÜ\s]+$/;
            
            // 2. KURAL: Anlamsız sessiz harf dizilimi kontrolü (Örn: "vghjk")
            const sessizKontrol = /([^aeıioöuü\s]{5,})/i;

            if (name.length < 3) {
                alert("İsim çok kısa! Lütfen gerçek adınızı yazın.");
                return;
            }

            if (!sadeceHarf.test(name)) {
                alert("Hata: İsimde sayı veya özel karakter kullanılamaz!");
                return;
            }

            if (sessizKontrol.test(name)) {
                alert("Lütfen rastgele harfler yerine geçerli bir isim girin!");
                return;
            }

            // Başarılı giriş
            localStorage.setItem('m_izi_name', name);
            localStorage.setItem('m_izi_img', photoData || document.getElementById('preview').src);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
