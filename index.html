<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik İzi | 5-A Giriş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0088cc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; }
        .btn { width: 100%; padding: 15px; background: #ff9f43; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color:#0088cc; margin-bottom:20px;">5-A Matematik İzi</h2>
        <input type="text" id="uName" placeholder="Adınız Soyadınız">
        <button class="btn" onclick="giris()">Sisteme Gir</button>
        <p style="font-size: 11px; margin-top: 15px; color: #888;">Giriş yaptığınızda bilgileriniz bu cihazda saklanır.</p>
    </div>

    <script>
        // TEK SEFERLİK GİRİŞ KONTROLÜ
        if(localStorage.getItem('m_izi_name')) {
            window.location.href = 'dashboard.html';
        }

        function giris() {
            const name = document.getElementById('uName').value.trim();
            if(name.length < 3) return alert("Lütfen isminizi tam girin.");
            
            // Küfür/Argo Filtresi
            const yasakli = ["kufur1", "argo1"]; // Burayı doldurabilirsin
            if(yasakli.some(k => name.toLowerCase().includes(k))) return alert("Uygunsuz isim!");

            localStorage.setItem('m_izi_name', name);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
