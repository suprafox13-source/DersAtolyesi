<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Matematik Atölyesi | Giriş</title>
    <style>
        body { background: #6c5ce7; font-family: 'Comic Sans MS', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 0 #4834d4; width: 350px; }
        .preview { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #6c5ce7; object-fit: cover; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; outline: none; }
        button { width: 100%; padding: 15px; background: #00b894; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color: #6c5ce7;">π Matematik</h1>
        <img id="imgPrev" src="https://via.placeholder.com/100" class="preview">
        <input type="file" id="fileInp" accept="image/*" style="font-size: 12px;">
        <input type="text" id="nameInp" placeholder="Adın Soyadın" required>
        <button onclick="basla()">Atölyeye Gir →</button>
    </div>

    <script>
        let photo = "";
        document.getElementById('fileInp').onchange = function(e) {
            let r = new FileReader();
            r.onload = () => { document.getElementById('imgPrev').src = r.result; photo = r.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        function basla() {
            localStorage.setItem('mat_name', document.getElementById('nameInp').value);
            localStorage.setItem('mat_img', photo);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
